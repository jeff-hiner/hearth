name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            arch: x86_64
            ext: zip
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: x86_64
            ext: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-13
            os: macos
            arch: x86_64
            ext: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            os: macos
            arch: aarch64
            ext: tar.gz

    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Vulkan SDK (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev

      - name: Install Vulkan SDK (macOS)
        if: matrix.os == 'macos'
        run: |
          curl -fsSL -o vulkan-sdk.dmg https://sdk.lunarg.com/sdk/download/latest/mac/vulkan-sdk.dmg
          hdiutil attach vulkan-sdk.dmg -mountpoint /Volumes/VulkanSDK
          # Find the installer app inside the DMG
          installer_app=$(find /Volumes/VulkanSDK -name "InstallVulkan*.app" -maxdepth 1 | head -1)
          if [ -z "$installer_app" ]; then
            echo "No installer app found, looking for alternative install method..."
            ls -la /Volumes/VulkanSDK/
            # Try running the install script if present
            if [ -f /Volumes/VulkanSDK/InstallVulkan.sh ]; then
              sudo /Volumes/VulkanSDK/InstallVulkan.sh --accept-licenses --default-answer --confirm-command install
            fi
          else
            sudo "$installer_app/Contents/MacOS/InstallVulkan" \
              --accept-licenses --default-answer --confirm-command install
          fi
          hdiutil detach /Volumes/VulkanSDK
          # Find the installed SDK version
          SDK_PATH=$(ls -d /usr/local/share/vulkan/sdk/*/macOS 2>/dev/null | head -1 || echo "")
          if [ -z "$SDK_PATH" ]; then
            SDK_PATH=$(ls -d "$HOME/VulkanSDK"/*/macOS 2>/dev/null | head -1 || echo "")
          fi
          if [ -z "$SDK_PATH" ]; then
            echo "ERROR: Could not find installed Vulkan SDK"
            find /usr/local -name "vulkan" -type d 2>/dev/null
            find "$HOME" -name "VulkanSDK" -type d 2>/dev/null
            exit 1
          fi
          echo "VULKAN_SDK=$SDK_PATH" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          staging="hearth-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir "$staging"
          cp target/${{ matrix.target }}/release/hearth.exe "$staging/"
          7z a "$staging.zip" "$staging"

      - name: Package (Unix)
        if: matrix.os != 'windows'
        run: |
          staging="hearth-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir "$staging"
          cp target/${{ matrix.target }}/release/hearth "$staging/"
          tar czf "$staging.tar.gz" "$staging"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearth-${{ matrix.target }}
          path: hearth-${{ github.ref_name }}-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hearth-*.zip
            hearth-*.tar.gz
