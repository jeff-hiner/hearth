name: Release

on:
  push:
    tags:
      - "v*"
    branches: [ci]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            arch: x86_64
            ext: zip
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: x86_64
            ext: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            os: macos
            arch: x86_64
            ext: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            os: macos
            arch: aarch64
            ext: tar.gz

    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Vulkan SDK (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev

      - name: Install Vulkan SDK (macOS)
        if: matrix.os == 'macos'
        run: |
          brew install vulkan-headers vulkan-loader
          echo "VULKAN_SDK=$(brew --prefix)" >> "$GITHUB_ENV"

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}
          cargo build --release --examples --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          staging="hearth-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir "$staging"
          cp target/${{ matrix.target }}/release/hearth.exe "$staging/"
          cp target/${{ matrix.target }}/release/examples/*.exe "$staging/"
          cp models/*.py "$staging/"
          7z a "$staging.zip" "$staging"

      - name: Package (Unix)
        if: matrix.os != 'windows'
        run: |
          staging="hearth-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir "$staging"
          cp target/${{ matrix.target }}/release/hearth "$staging/"
          cp target/${{ matrix.target }}/release/examples/{estimate_depth,generate,generate_xl,gpu_info} "$staging/"
          cp models/*.py "$staging/"
          tar czf "$staging.tar.gz" "$staging"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearth-${{ matrix.target }}
          path: hearth-${{ github.ref_name }}-*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hearth-*.zip
            hearth-*.tar.gz
